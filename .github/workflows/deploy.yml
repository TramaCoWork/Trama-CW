name: Deploy to Production

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Key file size: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "Key first line: $(head -1 ~/.ssh/deploy_key)"
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ${{ secrets.DEPLOY_PATH }}/{uploads,logs}"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='uploads' \
            --exclude='logs' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            dist/ \
            package.json \
            package-lock.json \
            prisma/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Generate .env on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > ${{ secrets.DEPLOY_PATH }}/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          PORT=${{ vars.PORT || '3000' }}
          NODE_ENV=production
          UPLOAD_PATH=./uploads
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
          SUBSCRIPTION_NOTIFICATION_URL=${{ secrets.SUBSCRIPTION_NOTIFICATION_URL }}
          MAIL_PROVIDER=smtp
          MAIL_FROM=Trama CoWork <no-responder@tramacowork.com>
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=465
          SMTP_SECURE=true
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          TRIAL_DAYS=${{ vars.TRIAL_DAYS || '0' }}
          PAYMENT_MODE=${{ vars.PAYMENT_MODE || 'subscription' }}
          LOG_RETENTION_DAYS=${{ vars.LOG_RETENTION_DAYS || '90' }}
          EOF"

      - name: Install dependencies, run migrations and restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             npm ci --legacy-peer-deps && \
             npx prisma generate && \
             npx prisma migrate deploy && \
             (pm2 restart trama-backend 2>/dev/null || pm2 start dist/main.js --name trama-backend)"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sleep 5 && curl -sf http://localhost:${{ vars.PORT || '3000' }}/health && echo ' Server is up!' || (echo 'Health check failed' && exit 1)"
