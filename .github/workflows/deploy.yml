name: Deploy to Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. v0.1.15) - optional"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy_pkg
          cp -r dist deploy_pkg/
          cp package.json package-lock.json prisma.config.js deploy_pkg/
          cp -r prisma deploy_pkg/
          echo "Deploy package contents:"
          find deploy_pkg/dist/src/uploads -type f 2>/dev/null || echo "WARNING: uploads module not found in build!"

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ${{ secrets.DEPLOY_PATH }}/{uploads,logs}"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='/uploads' \
            --exclude='/logs' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            deploy_pkg/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Generate .env on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > ${{ secrets.DEPLOY_PATH }}/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          PORT=${{ vars.PORT || '3000' }}
          NODE_ENV=production
          UPLOAD_PATH=./uploads
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
          SUBSCRIPTION_NOTIFICATION_URL=${{ vars.SUBSCRIPTION_NOTIFICATION_URL }}
          MAIL_PROVIDER=smtp
          MAIL_FROM=Trama CoWork <no-responder@tramacowork.com>
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=465
          SMTP_SECURE=true
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          TRIAL_DAYS=${{ vars.TRIAL_DAYS || '0' }}
          PAYMENT_MODE=${{ vars.PAYMENT_MODE || 'subscription' }}
          LOG_RETENTION_DAYS=${{ vars.LOG_RETENTION_DAYS || '90' }}
          EOF"

      - name: Install dependencies, run migrations and restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             npm ci --legacy-peer-deps && \
             npx prisma generate && \
             npx prisma migrate deploy && \
             (pm2 delete trama-backend 2>/dev/null || true) && \
             pm2 start dist/src/main.js --name trama-backend && \
             pm2 save"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sleep 10 && curl -sf http://localhost:${{ vars.PORT || '3000' }}/ && echo ' Server is up!' || (echo 'Health check failed' && exit 1)"
