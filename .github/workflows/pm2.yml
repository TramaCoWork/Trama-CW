name: PM2 Manage

on:
  push:
    tags:
      - "pm2-*"
  workflow_dispatch:
    inputs:
      action:
        description: "PM2 action to perform"
        required: true
        default: "restart"
        type: choice
        options:
          - restart
          - stop
          - logs
          - env
          - env-restart

jobs:
  pm2:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Regenerate .env
        if: github.event.inputs.action == 'env' || github.event.inputs.action == 'env-restart'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > ${{ secrets.DEPLOY_PATH }}/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          PORT=${{ vars.PORT || '3000' }}
          NODE_ENV=production
          UPLOAD_PATH=./uploads
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
          SUBSCRIPTION_NOTIFICATION_URL=${{ vars.SUBSCRIPTION_NOTIFICATION_URL }}
          MAIL_PROVIDER=smtp
          MAIL_FROM=Trama CoWork <no-responder@tramacowork.com>
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=465
          SMTP_SECURE=true
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          TRIAL_DAYS=${{ vars.TRIAL_DAYS || '0' }}
          PAYMENT_MODE=${{ vars.PAYMENT_MODE || 'subscription' }}
          LOG_RETENTION_DAYS=${{ vars.LOG_RETENTION_DAYS || '90' }}
          SUPPORT_EMAIL=${{ vars.SUPPORT_EMAIL }}
          TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
          EOF"
          echo ".env regenerated on server"

      - name: PM2 Restart
        if: github.event_name == 'push' || github.event.inputs.action == 'restart' || github.event.inputs.action == 'env-restart'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             (pm2 delete trama-backend 2>/dev/null || true) && \
             pm2 start dist/src/main.js --name trama-backend && \
             pm2 save"

      - name: PM2 Stop
        if: github.event.inputs.action == 'stop'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "pm2 stop trama-backend 2>/dev/null && pm2 save || echo 'Not running'"

      - name: PM2 Logs
        if: github.event.inputs.action == 'logs'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "pm2 logs trama-backend --lines 50 --nostream"

      - name: Health check
        if: github.event_name == 'push' || github.event.inputs.action == 'restart' || github.event.inputs.action == 'env-restart'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sleep 10 && curl -sf http://localhost:${{ vars.PORT || '3000' }}/ && echo ' Server is up!' || (echo 'Health check failed' && exit 1)"
